c<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - مكتب المحاماة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800;900&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a1628;
            --bg-secondary: #0f1f35;
            --bg-card: #152238;
            --accent-gold: #c9a227;
            --accent-gold-light: #e8c547;
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --border-color: #1e3a5f;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* Background Pattern */
        .bg-pattern {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
            opacity: 0.03;
            background-image:
                linear-gradient(45deg, transparent 45%, var(--accent-gold) 45%, var(--accent-gold) 55%, transparent 55%),
                linear-gradient(-45deg, transparent 45%, var(--accent-gold) 45%, var(--accent-gold) 55%, transparent 55%);
            background-size: 60px 60px;
        }

        /* Particles */
        .particles-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--accent-gold);
            border-radius: 50%;
            opacity: 0;
            animation: floatParticle 8s infinite;
        }

        @keyframes floatParticle {
            0%   { opacity: 0; transform: translateY(100vh) scale(0); }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.5; }
            100% { opacity: 0; transform: translateY(-100px) scale(1); }
        }

        /* Ambient glow blobs */
        .blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
        }
        .blob-1 {
            width: 500px; height: 500px;
            background: rgba(201,162,39,0.06);
            top: -100px; left: -100px;
            animation: blobFloat 12s ease-in-out infinite alternate;
        }
        .blob-2 {
            width: 400px; height: 400px;
            background: rgba(30,58,95,0.25);
            bottom: -80px; right: -80px;
            animation: blobFloat 15s ease-in-out infinite alternate-reverse;
        }

        @keyframes blobFloat {
            from { transform: translate(0,0) scale(1); }
            to   { transform: translate(40px, 30px) scale(1.1); }
        }

        /* Card */
        .login-card {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 460px;
            margin: 2rem;
            background: linear-gradient(135deg, var(--bg-card) 0%, var(--bg-secondary) 100%);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 3rem 2.5rem;
            box-shadow: 0 40px 80px rgba(0,0,0,0.5);
            animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0; right: 0;
            width: 100%; height: 3px;
            background: linear-gradient(90deg, transparent, var(--accent-gold), transparent);
            border-radius: 20px 20px 0 0;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(30px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* Logo */
        .logo-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2.5rem;
            animation: fadeDown 0.6s 0.15s cubic-bezier(0.16,1,0.3,1) both;
        }

        .logo-icon {
            width: 64px; height: 64px;
            display: flex; align-items: center; justify-content: center;
            background: linear-gradient(135deg, rgba(201,162,39,0.15), rgba(201,162,39,0.05));
            border: 1px solid rgba(201,162,39,0.3);
            border-radius: 16px;
            margin-bottom: 1rem;
        }

        .logo-title {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-primary);
        }

        .logo-sub {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-top: 0.3rem;
            font-family: 'Amiri', serif;
        }

        /* Divider */
        .gold-divider {
            width: 50px; height: 2px;
            background: linear-gradient(90deg, var(--accent-gold), var(--accent-gold-light));
            margin: 0.8rem auto 0;
            border-radius: 2px;
        }

        /* Form */
        .form-group {
            margin-bottom: 1.5rem;
            animation: fadeDown 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }
        .form-group:nth-child(1) { animation-delay: 0.25s; }
        .form-group:nth-child(2) { animation-delay: 0.35s; }
        .form-group:nth-child(3) { animation-delay: 0.45s; }

        @keyframes fadeDown {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .form-label {
            display: block;
            margin-bottom: 0.6rem;
            color: var(--text-secondary);
            font-weight: 500;
            font-size: 0.95rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            top: 50%; right: 1rem;
            transform: translateY(-50%);
            color: var(--text-secondary);
            pointer-events: none;
            transition: color 0.3s;
        }

        .form-input {
            width: 100%;
            padding: 0.9rem 3rem 0.9rem 1.25rem;
            background: rgba(10,22,40,0.6);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            color: var(--text-primary);
            font-family: 'Tajawal', sans-serif;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent-gold);
            box-shadow: 0 0 0 3px rgba(201,162,39,0.12);
            background: rgba(10,22,40,0.8);
        }

        .form-input:focus + .input-icon,
        .input-wrapper:focus-within .input-icon {
            color: var(--accent-gold);
        }

        .form-input::placeholder {
            color: var(--text-secondary);
            opacity: 0.5;
        }

        /* Password toggle */
        .toggle-password {
            position: absolute;
            top: 50%; left: 1rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            padding: 0;
            transition: color 0.3s;
            display: flex;
        }
        .toggle-password:hover { color: var(--accent-gold); }

        /* Remember / Forgot row */
        .form-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            animation: fadeDown 0.6s 0.5s cubic-bezier(0.16,1,0.3,1) both;
        }

        .remember-label {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            cursor: pointer;
            color: var(--text-secondary);
            font-size: 0.9rem;
            user-select: none;
        }

        .remember-label input[type="checkbox"] {
            appearance: none;
            width: 18px; height: 18px;
            border: 1px solid var(--border-color);
            border-radius: 4px;
            background: rgba(10,22,40,0.6);
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
        }

        .remember-label input[type="checkbox"]:checked {
            background: var(--accent-gold);
            border-color: var(--accent-gold);
        }

        .remember-label input[type="checkbox"]:checked::after {
            content: '';
            position: absolute;
            top: 2px; right: 4px;
            width: 5px; height: 9px;
            border: 2px solid var(--bg-primary);
            border-top: none; border-right: none;
            transform: rotate(-45deg) scaleX(-1);
        }

        .forgot-link {
            color: var(--accent-gold);
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s;
        }
        .forgot-link:hover { opacity: 0.75; }

        /* Submit button */
        .btn-submit {
            width: 100%;
            display: flex; align-items: center; justify-content: center; gap: 0.75rem;
            padding: 1rem;
            background: linear-gradient(135deg, var(--accent-gold), var(--accent-gold-light));
            color: var(--bg-primary);
            font-weight: 800;
            font-size: 1.1rem;
            font-family: 'Tajawal', sans-serif;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            overflow: hidden;
            position: relative;
            transition: all 0.3s ease;
            animation: fadeDown 0.6s 0.55s cubic-bezier(0.16,1,0.3,1) both;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            transition: left 0.5s ease;
        }

        .btn-submit:hover::before { left: 100%; }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 40px rgba(201,162,39,0.4);
        }

        .btn-submit:active { transform: translateY(0); }

        /* Spinner inside button */
        .spinner {
            display: none;
            width: 20px; height: 20px;
            border: 2px solid rgba(10,22,40,0.3);
            border-top-color: var(--bg-primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        .btn-submit.loading .btn-text { display: none; }
        .btn-submit.loading .spinner { display: block; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Error / success messages */
        .alert {
            padding: 0.9rem 1.25rem;
            border-radius: 10px;
            font-size: 0.95rem;
            margin-bottom: 1.5rem;
            display: none;
            animation: fadeDown 0.3s ease both;
        }

        .alert-error {
            background: rgba(239,68,68,0.1);
            border: 1px solid rgba(239,68,68,0.3);
            color: #fca5a5;
        }

        .alert-success {
            background: rgba(34,197,94,0.1);
            border: 1px solid rgba(34,197,94,0.3);
            color: #86efac;
        }

        /* Footer link */
        .card-footer {
            text-align: center;
            margin-top: 2rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            animation: fadeDown 0.6s 0.65s cubic-bezier(0.16,1,0.3,1) both;
        }

        .card-footer a {
            color: var(--accent-gold);
            text-decoration: none;
            font-weight: 600;
            transition: opacity 0.2s;
        }
        .card-footer a:hover { opacity: 0.75; }

        /* Input focus ring pulse on error */
        .form-input.error {
            border-color: #ef4444;
            box-shadow: 0 0 0 3px rgba(239,68,68,0.1);
            animation: shake 0.4s ease;
        }

        @keyframes shake {
            0%,100% { transform: translateX(0); }
            20%,60%  { transform: translateX(-6px); }
            40%,80%  { transform: translateX(6px); }
        }
    </style>
</head>
<body>

    <div class="bg-pattern"></div>
    <div class="particles-container" id="particles"></div>
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>

    <div class="login-card">

        <!-- Logo -->
        <div class="logo-wrapper">
            <div class="logo-icon">
                <svg width="36" height="36" viewBox="0 0 45 45" fill="none">
                    <path d="M22.5 3L4 12v6c0 9.5 7.5 18 18.5 21 11-3 18.5-11.5 18.5-21v-6L22.5 3z"
                          stroke="var(--accent-gold)" stroke-width="2"/>
                    <path d="M15 22h15M22.5 15v14"
                          stroke="var(--accent-gold)" stroke-width="2"/>
                </svg>
            </div>
            <div class="logo-title">عبدالمنعم أبو السعود</div>
            <div class="logo-sub">مكتب المحاماة والاستشارات القانونية</div>
            <div class="gold-divider"></div>
        </div>

        <!-- Alert messages -->
        <div class="alert alert-error" id="errorAlert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-left:6px">
                <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <span id="errorMsg">البريد الإلكتروني أو كلمة المرور غير صحيحة</span>
        </div>

        <div class="alert alert-success" id="successAlert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="display:inline;vertical-align:middle;margin-left:6px">
                <polyline points="20 6 9 17 4 12"/>
            </svg>
            جارٍ تحويلك إلى لوحة التحكم...
        </div>

        <!-- Login Form -->
        <div id="loginForm">

            <!-- Email -->
            <div class="form-group">
                <label class="form-label" for="email">البريد الإلكتروني</label>
                <div class="input-wrapper">
                    <input type="email" id="email" class="form-input"
                           placeholder="example@email.com" autocomplete="email">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
                            <polyline points="22,6 12,13 2,6"/>
                        </svg>
                    </span>
                </div>
            </div>

            <!-- Password -->
            <div class="form-group">
                <label class="form-label" for="password">كلمة المرور</label>
                <div class="input-wrapper">
                    <input type="password" id="password" class="form-input"
                           placeholder="••••••••" autocomplete="current-password">
                    <span class="input-icon">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                             stroke="currentColor" stroke-width="2">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                        </svg>
                    </span>
                    <button class="toggle-password" id="togglePassword" type="button" aria-label="إظهار كلمة المرور">
                        <!-- Eye icon -->
                        <svg id="eyeIcon" width="18" height="18" viewBox="0 0 24 24"
                             fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                    </button>
                </div>
            </div>

            <!-- Remember / Forgot -->
            <div class="form-meta">
                <label class="remember-label">
                    <input type="checkbox" id="rememberMe">
                    <span>تذكرني</span>
                </label>
                <a href="#" class="forgot-link">نسيت كلمة المرور؟</a>
            </div>

            <!-- Submit -->
            <button class="btn-submit" id="submitBtn" type="button" onclick="handleLogin()">
                <span class="btn-text">
                    دخول
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none"
                         stroke="currentColor" stroke-width="2.5">
                        <line x1="19" y1="12" x2="5" y2="12"/>
                        <polyline points="12 19 5 12 12 5"/>
                    </svg>
                </span>
                <div class="spinner"></div>
            </button>
        </div>

        <!-- Footer -->
        <div class="card-footer">
            <a href="index.html">
                ← العودة إلى الصفحة الرئيسية
            </a>
        </div>

    </div>

    <script>
        // ─── Particles ───────────────────────────────────────────────────────────
        (function createParticles() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 20; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    animation-delay: ${Math.random() * 8}s;
                    animation-duration: ${6 + Math.random() * 6}s;
                    width: ${2 + Math.random() * 3}px;
                    height: ${2 + Math.random() * 3}px;
                `;
                container.appendChild(p);
            }
        })();

        // ─── Toggle password visibility ───────────────────────────────────────
        document.getElementById('togglePassword').addEventListener('click', function () {
            const input = document.getElementById('password');
            const isText = input.type === 'text';
            input.type = isText ? 'password' : 'text';
            document.getElementById('eyeIcon').innerHTML = isText
                ? `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`
                : `<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                   <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                   <line x1="1" y1="1" x2="23" y2="23"/>`;
        });

        // ─── Login handler ────────────────────────────────────────────────────
        function handleLogin() {
            const email    = document.getElementById('email');
            const password = document.getElementById('password');
            const btn      = document.getElementById('submitBtn');
            const errorDiv = document.getElementById('errorAlert');
            const successDiv = document.getElementById('successAlert');

            // Clear previous states
            errorDiv.style.display = 'none';
            email.classList.remove('error');
            password.classList.remove('error');

            // Basic validation
            if (!email.value.trim()) {
                showError('يرجى إدخال البريد الإلكتروني', email);
                return;
            }
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email.value)) {
                showError('صيغة البريد الإلكتروني غير صحيحة', email);
                return;
            }
            if (!password.value) {
                showError('يرجى إدخال كلمة المرور', password);
                return;
            }
            if (password.value.length < 6) {
                showError('كلمة المرور يجب أن تكون 6 أحرف على الأقل', password);
                return;
            }

            // Loading state
            btn.classList.add('loading');

            // ─── Replace this block with your actual API call ─────────────────
            // Example:
            // fetch('/api/login', {
            //     method: 'POST',
            //     headers: { 'Content-Type': 'application/json' },
            //     body: JSON.stringify({ email: email.value, password: password.value })
            // })
            // .then(r => r.json())
            // .then(data => {
            //     if (data.success) { showSuccess(); }
            //     else { btn.classList.remove('loading'); showError(data.message); }
            // });
            // ─────────────────────────────────────────────────────────────────

            // Demo simulation
            setTimeout(() => {
                btn.classList.remove('loading');
                // Simulate a failed login for demo — replace with real logic
                const demoFail = (email.value !== 'admin@law.com');
                if (demoFail) {
                    showError('البريد الإلكتروني أو كلمة المرور غير صحيحة');
                } else {
                    showSuccess();
                }
            }, 1800);
        }

        function showError(msg, inputEl) {
            const div = document.getElementById('errorAlert');
            document.getElementById('errorMsg').textContent = msg;
            div.style.display = 'flex';
            div.style.alignItems = 'center';
            if (inputEl) inputEl.classList.add('error');
        }

        function showSuccess() {
            document.getElementById('successAlert').style.display = 'flex';
            document.getElementById('successAlert').style.alignItems = 'center';
            // Redirect after short delay
            // setTimeout(() => window.location.href = '/dashboard', 1500);
        }

        // Enter key support
        document.addEventListener('keydown', e => {
            if (e.key === 'Enter') handleLogin();
        });

        // Remove error class on input
        ['email','password'].forEach(id => {
            document.getElementById(id).addEventListener('input', function(){
                this.classList.remove('error');
                document.getElementById('errorAlert').style.display = 'none';
            });
        });
    </script>
</body>
</html>
